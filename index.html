<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Do you love me? 💻</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Scattered flowers background */
    .flowers-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .flower {
      position: absolute;
      font-size: 1.3rem;
      opacity: 0.55;
      animation: floatFlower ease-in-out infinite alternate;
    }
    @keyframes floatFlower {
      0%   { transform: translateY(0px) rotate(-8deg); }
      100% { transform: translateY(-10px) rotate(8deg); }
    }

    /* Pages */
    .page {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      position: relative;
      z-index: 1;
      animation: fadeIn 0.5s ease;
    }
    .page.active { display: flex; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Photo card */
    .photo-card {
      width: 130px;
      height: 130px;
      border-radius: 22px;
      overflow: hidden;
      margin: 0 auto 1.4rem;
      box-shadow: 0 4px 20px rgba(0,0,0,0.10);
    }
    .photo-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .photo-placeholder {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #fce4ec, #f8bbd0);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.5rem;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 800;
      color: #333;
      line-height: 1.4;
      margin-bottom: 1.6rem;
    }
    h1 .icon { margin: 0 4px; }

    /* Buttons */
    .btn-group {
      display: flex;
      gap: 0.9rem;
      justify-content: center;
      align-items: center;
    }

    .btn {
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 800;
      padding: 0.65rem 1.9rem;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn:active { transform: scale(0.94); }

    .btn-yes {
      background: #f48fb1;
      color: white;
      box-shadow: 0 3px 14px rgba(244,143,177,0.45);
    }
    .btn-yes:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 20px rgba(244,143,177,0.55);
    }

    .btn-no {
      background: #ffe4ef;
      color: #e88fae;
      position: fixed;
    }
    .btn-no:hover { cursor: pointer; }

    .btn-next {
      background: #f48fb1;
      color: white;
      box-shadow: 0 3px 14px rgba(244,143,177,0.45);
    }
    .btn-next:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 20px rgba(244,143,177,0.55);
    }

    /* Page 2 sub text */
    .sub {
      font-size: 1rem;
      color: #aaa;
      font-weight: 600;
      margin-bottom: 1.6rem;
    }

    /* Page 3 tags */
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      justify-content: center;
      margin-top: 1.2rem;
    }
    .tag {
      background: #fff0f5;
      border: 2px solid #f8bbd0;
      border-radius: 50px;
      padding: 0.4rem 1rem;
      font-size: 0.88rem;
      font-weight: 700;
      color: #e48fad;
    }

    /* Confetti */
    .confetti-piece {
      position: fixed;
      pointer-events: none;
      z-index: 999;
      border-radius: 2px;
      animation: confettiFall linear forwards;
    }
    @keyframes confettiFall {
      0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>

<div class="flowers-bg" id="flowersBg"></div>

<!-- PAGE 1 -->
<div class="page active" id="page1">
  <div class="photo-card">
    <div class="photo-placeholder">🐶</div>
  </div>
  <h1><span class="icon">🌸</span> Do you love me? <span class="icon">🌸</span></h1>
  <div class="btn-group" style="position:relative;height:50px;">
    <button class="btn btn-yes" onclick="goToPage2()">Yes 💖</button>
    <button class="btn btn-no" id="no-btn" onmouseenter="runAway()" onclick="runAway()">No 🙈</button>
  </div>
</div>

<!-- PAGE 2 -->
<div class="page" id="page2">
  <div class="photo-card">
    <div class="photo-placeholder">😱</div>
  </div>
  <h1>Wait… you actually said yes?!</h1>
  <p class="sub">"I was so ready for you to say no"</p>
  <div class="btn-group">
    <button class="btn btn-next" onclick="goToPage3()">okay okay &nbsp;→</button>
  </div>
</div>

<!-- PAGE 3 -->
<div class="page" id="page3">
  <div class="photo-card">
    <div class="photo-placeholder">💻</div>
  </div>
  <h1>Glad you didn't say no.</h1>
  <p class="sub">Be ready — you now have an IT boyfriend.</p>
  <div class="tags">
    <span class="tag">🖥️ debugs at 2am</span>
    <span class="tag">☕ powered by coffee & love</span>
    <span class="tag">🤓 will explain git to you</span>
  </div>
</div>

<script>
  // Scattered flowers
  const bg = document.getElementById('flowersBg');
  const icons = ['🌸', '🌺', '💮', '🌷', '✿', '🌸', '🌸'];
  for (let i = 0; i < 22; i++) {
    const f = document.createElement('span');
    f.className = 'flower';
    f.textContent = icons[Math.floor(Math.random() * icons.length)];
    f.style.left = (2 + Math.random() * 96) + 'vw';
    f.style.top  = (2 + Math.random() * 96) + 'vh';
    f.style.fontSize = (0.8 + Math.random() * 1) + 'rem';
    f.style.animationDuration = (2 + Math.random() * 3) + 's';
    f.style.animationDelay = (Math.random() * 3) + 's';
    bg.appendChild(f);
  }

  // No button — place next to Yes initially
  const noBtn = document.getElementById('no-btn');
  let noMoves = 0;

  function placeNoBtn() {
    const yes = document.querySelector('.btn-yes');
    const r = yes.getBoundingClientRect();
    noBtn.style.left = (r.right + 14) + 'px';
    noBtn.style.top  = r.top + 'px';
  }
  placeNoBtn();
  window.addEventListener('resize', placeNoBtn);

  function runAway() {
    noMoves++;
    const margin = 40;
    const maxX = window.innerWidth  - noBtn.offsetWidth  - margin;
    const maxY = window.innerHeight - noBtn.offsetHeight - margin;
    let newX, newY, tries = 0;
    do {
      newX = margin + Math.random() * maxX;
      newY = margin + Math.random() * maxY;
      tries++;
    } while (tries < 15 && isTooCloseToYes(newX, newY));

    noBtn.style.transition = 'left 0.18s ease, top 0.18s ease';
    noBtn.style.left = newX + 'px';
    noBtn.style.top  = newY + 'px';

    const labels = ['No 🙈', 'Nope!', 'Nah 😅', 'Never!', 'Nice try!', 'Noooo!', "Can't catch me!", '🏃💨', '😤'];
    noBtn.textContent = labels[Math.min(noMoves - 1, labels.length - 1)];
  }

  function isTooCloseToYes(x, y) {
    const r = document.querySelector('.btn-yes').getBoundingClientRect();
    return Math.hypot(x - (r.left + r.width/2), y - (r.top + r.height/2)) < 150;
  }

  function goToPage(from, to) {
    document.getElementById(from).classList.remove('active');
    document.getElementById(to).classList.add('active');
  }

  function goToPage2() { goToPage('page1', 'page2'); }
  function goToPage3() { goToPage('page2', 'page3'); launchConfetti(); }

  function launchConfetti() {
    const colors = ['#f48fb1', '#ce93d8', '#fff176', '#80cbc4', '#ef9a9a', '#ffcc80'];
    for (let i = 0; i < 90; i++) {
      setTimeout(() => {
        const c = document.createElement('div');
        c.className = 'confetti-piece';
        c.style.left = Math.random() * 100 + 'vw';
        c.style.top = '-10px';
        c.style.width  = (6 + Math.random() * 8) + 'px';
        c.style.height = (6 + Math.random() * 8) + 'px';
        c.style.background = colors[Math.floor(Math.random() * colors.length)];
        c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        c.style.animationDuration = (2.5 + Math.random() * 2) + 's';
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 5000);
      }, i * 25);
    }
  }
</script>
</body>
</html>
